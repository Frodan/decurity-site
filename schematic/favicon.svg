<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <style>
    .dark { display: none }
    @media (prefers-color-scheme: dark) {
      .light { display: none }
      .dark { display: inline }
    }
  </style>
  <image class="light" width="128" height="128" href="data:image/png;base64,"/>
  <image class="dark" width="128" height="128" href="data:image/png;base64,"/>
</svg>
