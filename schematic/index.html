<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decurity — Schematic Redesign</title>
<meta name="description" content="Decurity site redesign preview — Schematic direction (blueprint audit document).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* Decurity — global styles ported verbatim from Claude Design "Decurity.dc.html" */

html, body { margin:0; padding:0; }
body { background:#161B24; color:#E9ECF1; font-family:'IBM Plex Sans',sans-serif; -webkit-font-smoothing:antialiased; }

/* hydration-boundary wrapper for the imported design markup */
.dc-root { position:relative; background:#161B24; color:#E9ECF1; font-family:'IBM Plex Sans',sans-serif; -webkit-font-smoothing:antialiased; overflow-x:clip; }

:root { --acc:#3B7DFF; --acc2:#5FD0FF; --bg:#161B24; --panel:#1C222D; --line:transparent; }
  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { margin:0; background:#161B24; }
  ::selection { background:var(--acc); color:#fff; }
  a { color:inherit; text-decoration:none; }
  .mono { font-family:'IBM Plex Mono',monospace; }
  .card { background:#1C222D; border:1px solid rgba(255,255,255,.08); border-radius:5px; transition:border-color .25s ease, background .25s ease; }
  .card:hover { border-color:rgba(255,255,255,.2); background:#20262F; }
  .srow { transition:background .2s; }
  .srow:hover { background:rgba(255,255,255,.03); }
  .srow:hover .snum { color:var(--acc2); }
  .srow:hover .sicon { color:var(--acc2); }
  .srow:hover h3 { color:#fff; }
  .srow:hover .srow-ar { color:var(--acc2); transform:translateX(5px); }
  @media (max-width:760px){ .srow{ grid-template-columns:1fr !important; gap:8px !important; padding:22px 14px !important; } .srow .srow-ar{ display:none !important; } }
  @media (max-width:900px){ .svc2{ grid-template-columns:1fr !important; gap:36px !important; } .svc2-intro{ position:static !important; } .prod2{ grid-template-columns:1fr !important; gap:40px !important; } }
  .plogo { opacity:0; transform:translateY(24px) scale(.96); transition:opacity .55s cubic-bezier(.22,1,.36,1), transform .55s cubic-bezier(.22,1,.36,1), border-color .25s, background .25s; }
  .plogo.in { opacity:1; transform:none; }
  .plogo:hover { border-color:rgba(255,255,255,.2); background:#20262F; }
  @media (prefers-reduced-motion:reduce){ .plogo{ opacity:1 !important; transform:none !important; } }
  @media (max-width:720px){
    .pgrid{ grid-template-columns:repeat(2,minmax(0,1fr)) !important; gap:10px !important; }
    .plogo{ padding:24px 16px !important; min-height:76px !important; }
    .plogo img{ max-width:100% !important; width:auto !important; height:auto !important; max-height:26px !important; }
  }
  @media (max-width:900px){ .cta2{ grid-template-columns:1fr !important; gap:44px !important; } }
  .flabel { display:block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.1em; color:#8B93A1; text-transform:uppercase; margin-bottom:8px; }
  .finput { width:100%; background:transparent; border:0; border-bottom:1px solid rgba(255,255,255,.16); border-radius:0; padding:10px 2px 12px; color:#E9ECF1; font-size:13.5px; font-family:'IBM Plex Mono',monospace; transition:border-color .2s; }
  .finput:focus { outline:none; border-bottom-color:var(--acc2); }
  .finput::placeholder { color:#525A68; }
  .fcheck { position:relative; display:flex; align-items:center; gap:11px; cursor:pointer; font-size:14px; color:#C2C8D2; padding:8px 0; user-select:none; transition:color .15s; }
  .fcheck:hover { color:#fff; }
  .fcheck input { position:absolute; opacity:0; width:0; height:0; pointer-events:none; }
  .fcheck .box { width:17px; height:17px; border-radius:2px; border:1px solid rgba(255,255,255,.24); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:border-color .15s, background .15s; }
  .fcheck .box svg { opacity:0; transition:opacity .12s; }
  .fcheck:hover .box { border-color:rgba(255,255,255,.45); }
  .fcheck:has(input:checked) { color:#fff; }
  .fcheck:has(input:checked) .box { background:var(--acc); border-color:var(--acc); }
  .fcheck:has(input:checked) .box svg { opacity:1; }
  @media (max-width:520px){ .cform-grid{ grid-template-columns:1fr !important; } .foot-grid{ grid-template-columns:1fr !important; gap:28px !important; } }
  .btn { display:inline-flex; align-items:center; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; letter-spacing:.07em; text-transform:uppercase; border-radius:2px; text-decoration:none; white-space:nowrap; }
  .btn .lbl { display:flex; align-items:center; padding:15px 22px; }
  .btn .ar { display:flex; align-items:center; padding-right:20px; margin-left:-8px; }
  .btn .ar svg { transition:transform .26s cubic-bezier(.22,1,.36,1); }
  .btn:hover .ar svg { transform:translateX(4px); }
  .btn-p { background:var(--acc); color:#fff; transition:background .2s; }
  .btn-p:hover { background:#5C97FF; }
  .btn-s { border:1px solid rgba(255,255,255,.22); color:#D6DAE2; transition:border-color .2s, color .2s; }
  .btn-s .ar svg { color:var(--acc2); transition:color .2s; }
  .btn-s:hover { border-color:var(--acc); color:#fff; }
  .btn-sm .lbl { padding:11px 15px; font-size:12px; }
  .btn-sm .ar { padding-right:13px; }
  .tcard { position:relative; opacity:0; transform:translateX(-48px); transition:opacity 1s cubic-bezier(.22,1,.36,1), transform 1s cubic-bezier(.22,1,.36,1), border-color .25s, background .25s; }
  .tcard.in { opacity:1; transform:none; }
  .tcard:hover { border-color:rgba(255,255,255,.2) !important; background:#20262F !important; }
  @media (prefers-reduced-motion:reduce){ .tcard{ opacity:1 !important; transform:none !important; } }
  @media (max-width:900px){ .tbento{ grid-template-columns:1fr !important; } .tbento > div{ grid-column:auto !important; grid-row:auto !important; } }
  @media (max-width:720px){
    .trow{ flex-wrap:wrap !important; gap:12px 16px !important; }
    .trow .tname{ flex:1 1 auto !important; }
    .trow .trole{ width:auto !important; order:2; }
    .trow .tach{ width:100% !important; order:3; flex-basis:100% !important; padding-left:68px; }
    .trow .tach:empty{ display:none; }
  }
  .stitle { font-weight:700; letter-spacing:-.03em; margin:0; line-height:1.04; }
  .h1 { font-size:clamp(42px, 8.5vw, 72px) !important; }
  .logo-mq img { transition:opacity .2s; }
  .navl:hover { color:#fff !important; }

  @keyframes mq { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
  @media (max-width:960px){
    .nav-links{ display:none !important; }
    .hero-grid{ grid-template-columns:1fr !important; }
    .hero-anim{ display:none !important; }
    .g3{ grid-template-columns:1fr !important; }
    .foot-grid{ grid-template-columns:1fr 1fr !important; }
  }
  @media (max-width:720px){
    .sect{ padding:56px 20px !important; }
    .px{ padding-left:20px !important; padding-right:20px !important; }
    .stitle{ font-size:clamp(28px, 7.5vw, 40px) !important; }
    .hstats > div{ padding:0 18px !important; }
    .hstats > div:first-child{ padding-left:0 !important; }
    .hstat-n{ font-size:20px !important; }
    .logo-mq img{ height:24px !important; }
    .logo-mq > div{ gap:40px !important; padding-right:40px !important; }
  }

body { background:#0D1320; }
</style>
</head>

<div id="root"></div>
